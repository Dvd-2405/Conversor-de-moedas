<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Conversor de moedas em tempo real com taxas atualizadas">
    <link rel="stylesheet" href="style.css">
    <title>Conversor de Moedas</title>
</head>

<body>

    <header class="header">
        <h1 class="titulo">💱 Conversor de Moedas</h1>
        <p class="subtitulo">Calculadora de Câmbio em Tempo Real</p>
    </header>

    <section class="taxas-container" aria-label="Taxas de câmbio atuais">
        <h2 class="taxas-titulo">📊 Taxas de Câmbio</h2>
        <p class="taxas-update" id="taxasUpdate">Carregando taxas...</p>
        <div class="taxas-grid" id="taxasGrid"></div>
    </section>

    <main class="container">
        <div class="selects-row">
            <div class="select-wrapper">
                <label for="moeda1" class="sr-only">Moeda de origem</label>
                <span class="bandeira" id="bandeira1">🇧🇷</span>
                <select class="select-box" id="moeda1">
                    <option value="BRL">Real (BRL)</option>
                    <option value="USD">Dólar (USD)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="GBP">Libra (GBP)</option>
                </select>
            </div>

            <button class="btn-moeda" id="btnTrocar" aria-label="Trocar moedas" title="Trocar moedas">💰</button>

            <div class="select-wrapper">
                <label for="moeda2" class="sr-only">Moeda de destino</label>
                <span class="bandeira" id="bandeira2">🇺🇸</span>
                <select class="select-box" id="moeda2">
                    <option value="USD">Dólar (USD)</option>
                    <option value="BRL">Real (BRL)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="GBP">Libra (GBP)</option>
                </select>
            </div>
        </div>

        <div class="converter-row">
            <label for="valor1" class="sr-only">Valor a converter</label>
            <input type="number" class="placeholder-box" id="valor1" placeholder="Digite o valor" min="0">

            <button class="btn-converter-moeda" id="btnConverter" aria-label="Converter moeda" title="Converter">🪙</button>

            <label for="valor2" class="sr-only">Resultado</label>
            <input type="text" class="placeholder-box" id="valor2" placeholder="Resultado" readonly aria-live="polite">
        </div>
    </main>

    <script src="aplicacao.js"></script>
</body>

</html>
