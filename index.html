<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Conversor de Moedas</title>
</head>

<body>

    <div class="header">
        <h1 class="titulo">💱 Conversor de Moedas</h1>
        <p class="subtitulo">Calculadora de Câmbio em Tempo Real</p>
    </div>

    <div class="taxas-container">
        <h2 class="taxas-titulo">📊 Taxas de Câmbio</h2>
        <p class="taxas-update" id="taxasUpdate">Carregando taxas...</p>
        <div class="taxas-grid" id="taxasGrid">

        </div>
    </div>

    <div class="container">
        <div class="selects-row">
            <div class="select-wrapper">
                <span class="bandeira" id="bandeira1">🇧🇷</span>
                <select class="select-box" id="moeda1">
                    <option value="BRL">Real (BRL)</option>
                    <option value="USD">Dólar (USD)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="GBP">Libra (GBP)</option>
                </select>
            </div>

            <button class="btn-moeda" id="btnTrocar" title="Trocar moedas">💰</button>

            <div class="select-wrapper">
                <span class="bandeira" id="bandeira2">🇺🇸</span>
                <select class="select-box" id="moeda2">
                    <option value="USD">Dólar (USD)</option>
                    <option value="BRL">Real (BRL)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="GBP">Libra (GBP)</option>
                </select>
            </div>
        </div>

        <div class="converter-row">
            <input type="number" class="placeholder-box" id="valor1" placeholder="Digite o valor">

            <button class="btn-converter-moeda" id="btnConverter" title="Converter">🪙</button>

            <input type="text" class="placeholder-box" id="valor2" placeholder="Resultado" readonly>
        </div>
    </div>

    <script src="aplicacao.js"></script>
</body>

</html>
